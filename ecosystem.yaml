# Ecosystem Configuration
# Central config for all projects in the ecosystem

ecosystem:
  name: "appEcosystem"
  version: "0.1.0"
  base_path: "/Volumes/ASSD/GitProjects"

# Shared HMAC secret for inter-service authentication
# In production, use environment variable ECOSYSTEM_HMAC_SECRET
auth:
  hmac_secret: "${ECOSYSTEM_HMAC_SECRET:-dev-ecosystem-secret-change-in-production}"
  token_validity_hours: 24
  token_rotation_hours: 12

# Service registry
registry:
  host: "0.0.0.0"
  port: 8500
  health_check_interval_seconds: 30
  persistence_file: "data/registry.json"

# Discovery
discovery:
  mdns_enabled: true
  mdns_service_type: "_ecosystem._tcp.local."
  fallback_to_static: true

# Event bus
events:
  retry_attempts: 3
  retry_delay_seconds: 5
  hmac_signing: true

# Project definitions
projects:
  ai_for_survival:
    name: "AI_For_Survival"
    path: "${base_path}/AI_For_Survival"
    host: "localhost"
    port: 8000
    health_endpoint: "/health"
    stack: "python-fastapi"
    description: "AI-powered survival assistant with RAG pipeline"

  openeye:
    name: "OpenEye"
    path: "${base_path}/OpenEye-OpenCV_Home_Security"
    host: "localhost"
    port: 8200
    health_endpoint: "/api/ecosystem/health"
    stack: "python-fastapi-react"
    description: "OpenCV home security surveillance system"

  magicmirror:
    name: "MagicMirror"
    path: "${base_path}/MagicMirror"
    host: "localhost"
    port: 8080
    health_endpoint: "/api/v1/health"
    stack: "nodejs-electron-express"
    description: "Smart mirror with modular widget system"

  asusguard:
    name: "AsusGuard"
    path: "${base_path}/logAnalysis"
    host: "localhost"
    port: 8088
    health_endpoint: "/api/status"
    stack: "python-flask"
    description: "Router log analysis and network security monitor"
