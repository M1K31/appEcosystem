# Ecosystem Configuration
# Central config for all projects in the ecosystem

ecosystem:
  name: "appEcosystem"
  version: "0.2.0"
  base_path: "/Volumes/Locker2/GitHub"

# Shared HMAC secret for inter-service authentication
# In production, use environment variable ECOSYSTEM_HMAC_SECRET
auth:
  hmac_secret: "${ECOSYSTEM_HMAC_SECRET:-dev-ecosystem-secret-change-in-production}"
  token_validity_hours: 24
  token_rotation_hours: 12

# Service registry
# host defaults to loopback so the control plane is not exposed on all
# interfaces. Override with ECOSYSTEM_REGISTRY_HOST=0.0.0.0 only when the
# registry is firewalled to a trusted network.
registry:
  host: "127.0.0.1"
  port: 8500
  health_check_interval_seconds: 30
  persistence_file: "data/registry.json"

# Discovery
discovery:
  mdns_enabled: true
  mdns_service_type: "_ecosystem._tcp.local."
  fallback_to_static: true

# Event bus
events:
  retry_attempts: 3
  retry_delay_seconds: 5
  hmac_signing: true

# Cyber Claude Harness integration
cyber_harness:
  enabled: true
  daemon_url: "http://localhost:8088"
  prefer_harness: true
  fallback_to_legacy: true

# Project definitions
# Each project defines its path, port, health endpoint, and start command.
# start_command is run from the project's path directory.
projects:
  ai_for_survival:
    name: "AI_For_Survival"
    path: "AI-for-Survival/backend"
    host: "192.168.50.73"
    port: 8000
    health_endpoint: "/health"
    priority: 100          # Preferred ecosystem manager
    stack: "python-fastapi"
    start_command: "python -m uvicorn src.api.main:app --host 0.0.0.0 --port 8000"
    description: "AI-powered survival assistant with RAG pipeline"

  openeye:
    name: "OpenEye"
    path: "OpenEye-OpenCV_Home_Security/opencv_surveillance"
    host: "192.168.50.73"
    port: 8200
    health_endpoint: "/api/health"
    priority: 50           # Fallback ecosystem manager
    stack: "python-fastapi-react"
    start_command: "python -m uvicorn backend.main:app --host 0.0.0.0 --port 8200"
    description: "OpenCV home security surveillance system"

  magicmirror:
    name: "MagicMirror"
    path: "MagicMirror-Custom"
    host: "192.168.50.73"
    port: 8080
    health_endpoint: "/api/v1/health"
    priority: 10
    stack: "nodejs-electron-express"
    start_command: "node serveronly"
    description: "Smart mirror with modular widget system"

  asusguard:
    name: "AsusGuard"
    path: "LogAnalysis"
    host: "192.168.50.73"
    port: 8088
    health_endpoint: "/api/status"
    priority: 10
    stack: "python-flask"
    start_command: "python -m asusguard.dashboard"
    description: "Router log analysis and network security monitor"

  asusguard_daemon:
    name: "AsusGuard_Daemon"
    path: "CybersecurityTeam/cyber-claude-agents"
    host: "192.168.50.73"
    port: 8088
    health_endpoint: "/api/status"
    priority: 15
    stack: "python-aiohttp"
    start_command: "python -m daemon.asusguard_daemon"
    description: "Cyber Claude Harness daemon — preferred security analysis backend"
